<!-- Top bar: main-ui frosted styles -->
<div class="main-ui-navbar-wrap">
  <div class="main-ui-bar">
    <!-- Title with dropdown -->
    <div style="position: relative;">
      <a href="/" class="main-ui-btn main-ui-btn-secondary" id="episcopalLineageBtn">
        Episcopal Lineage
      </a>
      <div class="main-ui-dropdown main-ui-dropdown-below" id="episcopalLineageDropdown">
        <a class="main-ui-dropdown-item" href="/">
          <i class="fas fa-project-diagram" style="margin-right: 8px;"></i>Lineage View
        </a>
        <!-- NOTE: Chapel View / WikiLite commented out until ready to deploy -->
      </div>
    </div>

    <!-- Right side buttons -->
    <div style="display: flex; align-items: center; gap: 8px;">
      <button id="navbar-search-btn" class="main-ui-btn main-ui-btn-secondary" title="Search clergy" style="display: none;">
        <i class="fas fa-search"></i>
      </button>
      {% if session.get('is_admin') %}
      <a href="{{ url_for('editor.editor') }}#settings" class="main-ui-btn main-ui-btn-secondary" title="Settings">
        <i class="fas fa-cog"></i>
      </a>
      {% endif %}
      {% if session.get('user_id') %}
      <a href="#" class="main-ui-btn main-ui-btn-secondary" title="Logout" hx-get="{{ url_for('auth.logout') }}" hx-target="body"
        hx-push-url="true">
        <i class="fas fa-sign-out-alt"></i>
      </a>
      {% else %}
      <a href="{{ url_for('auth.login') }}" class="main-ui-btn main-ui-btn-secondary" title="Login">
        <i class="fas fa-sign-in-alt"></i>
      </a>
      {% endif %}
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const episcopalLineageBtn = document.getElementById('episcopalLineageBtn');
    const episcopalLineageDropdown = document.getElementById('episcopalLineageDropdown');

    if (episcopalLineageBtn && episcopalLineageDropdown) {
      episcopalLineageBtn.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();

        document.querySelectorAll('.main-ui-dropdown').forEach(function (menu) {
          if (menu !== episcopalLineageDropdown) {
            menu.classList.remove('show');
          }
        });

        episcopalLineageDropdown.classList.toggle('show');
      });

      document.addEventListener('click', function (e) {
        if (!episcopalLineageBtn.contains(e.target) && !episcopalLineageDropdown.contains(e.target)) {
          episcopalLineageDropdown.classList.remove('show');
        }
      });

      episcopalLineageDropdown.addEventListener('click', function (e) {
        if (e.target.tagName === 'A' || e.target.closest('a')) {
          setTimeout(function () {
            episcopalLineageDropdown.classList.remove('show');
          }, 100);
        }
      });
    }
  });
</script>
